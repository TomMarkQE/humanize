name: Restore native Codex candidate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  restore:
    if: github.event.pull_request.head.ref == 'agent/runtime-selected-native-subagents'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: agent/runtime-selected-native-subagents
      - name: Restore candidate
        run: bash .github/restore-native-candidate.sh
