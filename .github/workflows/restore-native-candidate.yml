name: Restore native Codex candidate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  restore:
    if: github.event.pull_request.head.ref == 'agent/runtime-selected-native-subagents'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: agent/runtime-selected-native-subagents

      - name: Reconstruct verified candidate payload
        id: reconstruct
        shell: bash
        run: |
          set +e
          {
            set -euo pipefail
            payload=/tmp/humanize-native-payload.json
            : > "$payload"
            for part in \
              .humanize-native-json.part-00 \
              .humanize-native-json.part-01 \
              .humanize-native-json.part-02 \
              .humanize-native-json.part-03 \
              .humanize-native-json.part-04 \
              .humanize-native-json.part-05a \
              .humanize-native-json.part-05b \
              .humanize-native-json.part-06 \
              .humanize-native-json.part-07 \
              .humanize-native-json.part-08 \
              .humanize-native-json.part-09 \
              .humanize-native-json.part-10 \
              .humanize-native-json.part-11
            do
              git show "803757b49564b71fe3eda94644762afa7650f7cb:${part}" >> "$payload"
            done

            python3 - "$payload" <<'PY'
          import json
          import os
          import pathlib
          import sys

          root = pathlib.Path.cwd().resolve()
          payload_path = pathlib.Path(sys.argv[1])
          print(f"payload_bytes={payload_path.stat().st_size}")
          payload = json.loads(payload_path.read_text(encoding="utf-8"))
          if payload.get("schema_version") != 1:
              raise SystemExit("unsupported payload schema")

          print(f"payload_files={len(payload['files'])}")
          for item in payload["files"]:
              relative = pathlib.PurePosixPath(item["path"])
              if relative.is_absolute() or ".." in relative.parts:
                  raise SystemExit(f"unsafe payload path: {relative}")
              target = (root / pathlib.Path(*relative.parts)).resolve()
              if root not in target.parents and target != root:
                  raise SystemExit(f"payload escaped repository: {relative}")
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(item["content"], encoding="utf-8", newline="\n")
              os.chmod(target, item.get("mode", 0o644))
          PY
          } > .restore-diagnostic.txt 2>&1
          status=$?
          set -e
          printf 'status=%s\n' "$status" >> .restore-diagnostic.txt
          cat .restore-diagnostic.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          rm -f .github/workflows/restore-native-candidate.yml
          if [[ "$status" -eq 0 ]]; then
            rm -f .restore-diagnostic.txt
          fi

      - name: Commit reconstructed candidate or diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          if [[ "${{ steps.reconstruct.outputs.status }}" == "0" ]]; then
            message="Restore native Codex implementation candidate"
          else
            message="Record native candidate restoration failure"
          fi
          git commit -m "$message"
          git push origin HEAD:agent/runtime-selected-native-subagents

      - name: Fail after recording diagnostics
        if: steps.reconstruct.outputs.status != '0'
        run: exit 1
