name: Run All Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  codex-native-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Test native Skill contracts and install copy
        run: bash tests/test-codex-native-skills.sh

  codex-native-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Test native deterministic state machine
        run: bash tests/test-codex-native-runtime.sh

  codex-native-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Test native install and migration
        run: bash tests/test-codex-hook-install.sh

  capture-full-regression-diagnostics:
    if: github.event_name == 'push' && github.ref_name == 'agent/runtime-selected-native-subagents'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: agent/runtime-selected-native-subagents
      - name: Persist failure details once
        shell: bash
        run: |
          if [[ -f .ci/full-regression-failures.log ]]; then
            exit 0
          fi
          sudo apt-get update >/dev/null
          sudo apt-get install -y zsh jq >/dev/null
          log_file="$RUNNER_TEMP/humanize-all-tests.log"
          set +e
          ./tests/run-all-tests.sh >"$log_file" 2>&1
          exit_code=$?
          set -e
          mkdir -p .ci
          {
            printf 'exit_code=%s\n' "$exit_code"
            awk '/^Failed suite details$/ { show=1 } show { print }' "$log_file"
          } > .ci/full-regression-failures.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci/full-regression-failures.log
          git commit -m "Capture full regression failure details"
          git push origin HEAD:agent/runtime-selected-native-subagents

  run-all-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh jq

      - name: Run all tests
        shell: bash
        run: |
          chmod +x tests/run-all-tests.sh
          log_file="$RUNNER_TEMP/humanize-all-tests.log"
          if ./tests/run-all-tests.sh >"$log_file" 2>&1; then
            tail -120 "$log_file"
          else
            echo "Full regression suite failed; showing only failure details."
            awk '
              /^Failed suite details$/ { show=1 }
              show { print }
            ' "$log_file"
            exit 1
          fi

  bash-3-runner-contract:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Verify fail-closed runner with system Bash
        run: |
          /bin/bash --version | head -1
          /bin/bash tests/test-test-runner.sh
