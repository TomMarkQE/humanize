name: Run All Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  codex-native-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Test native Skill contracts and install copy
        run: bash tests/test-codex-native-skills.sh

  codex-native-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Test native deterministic state machine
        run: bash tests/test-codex-native-runtime.sh

  codex-native-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Test native install and migration
        run: bash tests/test-codex-hook-install.sh

  capture-native-diagnostics:
    if: github.event_name == 'push' && github.ref_name == 'agent/runtime-selected-native-subagents'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: agent/runtime-selected-native-subagents
      - name: Apply title patch and persist target output
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('codex/skills/humanize-rlcr/SKILL.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('# Humanize RLCR for Codex', '# Humanize Codex-native workflow: RLCR', 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
          set +e
          mkdir -p .ci
          bash tests/test-codex-native-skills.sh > .ci/native-skills.log 2>&1
          skills_exit=$?
          bash tests/test-codex-hook-install.sh > .ci/native-install.log 2>&1
          install_exit=$?
          printf 'skills_exit=%s\ninstall_exit=%s\n' "$skills_exit" "$install_exit" > .ci/native-test-status.txt
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex/skills/humanize-rlcr/SKILL.md .ci/native-skills.log .ci/native-install.log .ci/native-test-status.txt
          git diff --cached --quiet && exit 0
          git commit -m "Finalize native Skill contract diagnostics"
          git push origin HEAD:agent/runtime-selected-native-subagents

  run-all-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh jq

      - name: Run all tests
        run: |
          chmod +x tests/run-all-tests.sh
          ./tests/run-all-tests.sh

  bash-3-runner-contract:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Verify fail-closed runner with system Bash
        run: |
          /bin/bash --version | head -1
          /bin/bash tests/test-test-runner.sh
