name: Capture native test diagnostics

on:
  push:
    branches:
      - agent/runtime-selected-native-subagents
    paths:
      - .github/workflows/capture-native-test-logs.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: agent/runtime-selected-native-subagents
      - name: Capture target test output
        shell: bash
        run: |
          set +e
          mkdir -p .ci
          bash tests/test-codex-native-skills.sh > .ci/native-skills.log 2>&1
          skills_exit=$?
          bash tests/test-codex-hook-install.sh > .ci/native-install.log 2>&1
          install_exit=$?
          printf 'skills_exit=%s\ninstall_exit=%s\n' "$skills_exit" "$install_exit" > .ci/native-test-status.txt
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci/native-skills.log .ci/native-install.log .ci/native-test-status.txt
          git diff --cached --quiet && exit 0
          git commit -m "Capture native test diagnostics"
          git push origin HEAD:agent/runtime-selected-native-subagents
      - name: Diagnostic capture complete
        run: echo "native diagnostic capture complete"
